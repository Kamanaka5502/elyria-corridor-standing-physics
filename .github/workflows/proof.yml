name: Corridor Standing Proof

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proof:
    name: deterministic-corridor-standing-proof
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run financial settlement corridor proof
        run: python CORRIDOR_STANDING_ENGINE.py

      - name: Run deterministic corridor-standing tests
        run: python test_corridor_standing.py
